services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: locator-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - qr_codes:/app/static/qrcode
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      default:
        aliases:
          - backend
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-locator_db}
      DB_USER: ${DB_USER:-locator_user}
      DB_PASSWORD: ${DB_PASSWORD:?Задайте DB_PASSWORD в .env (или передайте через --env-file)}
      DB_SSLMODE: ${DB_SSLMODE:-disable}

      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}

      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-admin}
      DEFAULT_ADMIN_API_KEY: ${DEFAULT_ADMIN_API_KEY:-}

      BASE_URL: ${BASE_URL:-http://localhost:8080}
      GIN_MODE: ${GIN_MODE:-release}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      # OSRM-совместимый сервер (GET …/match/v1/driving/…), без завершающего /
      ROUTING_BASE_URL: ${ROUTING_BASE_URL:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: locator-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:13-alpine
    container_name: locator-db
    ports:
      - "0.0.0.0:5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER:-locator_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?Задайте DB_PASSWORD в .env (или передайте через --env-file)}
      - POSTGRES_DB=${DB_NAME:-locator_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-locator_user} -d ${DB_NAME:-locator_db}"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: locator-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      default:
        aliases:
          - locator-rabbitmq

volumes:
  db_data:
  qr_codes:
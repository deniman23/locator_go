services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: locator-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - qr_codes:/app/static/qrcode
      - ${APK_RELEASES_DIR:-./backend/static/releases}:/app/static/releases
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      default:
        aliases:
          - backend
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-locator_db}
      DB_USER: ${DB_USER:-locator_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      DB_SSLMODE: ${DB_SSLMODE:-disable}

      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}

      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-admin}
      DEFAULT_ADMIN_API_KEY: ${DEFAULT_ADMIN_API_KEY:-change_me}

      BASE_URL: ${BASE_URL:-http://localhost:8080}
      GIN_MODE: ${GIN_MODE:-release}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      # OSRM match (GET …/match/v1/driving/…), без завершающего /
      # По умолчанию — публичный OSRM (работает сразу). Свой: http://osrm:5000 + profile osrm-local
      ROUTING_BASE_URL: ${ROUTING_BASE_URL:-https://router.project-osrm.org}
      # Публичный OSRM: не более ~10 точек на запрос. Свой OSRM: 50–80
      ROUTING_MATCH_CHUNK_SIZE: ${ROUTING_MATCH_CHUNK_SIZE:-10}
      ROUTING_MATCH_RADIUS: ${ROUTING_MATCH_RADIUS:-20}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: locator-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:13-alpine
    container_name: locator-db
    ports:
      - "0.0.0.0:5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER:-locator_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-change_me}
      - POSTGRES_DB=${DB_NAME:-locator_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-locator_user} -d ${DB_NAME:-locator_db}"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Опционально: docker compose --profile osrm-local up -d (сначала ./scripts/setup_osrm.sh, ~15–30 мин)
  osrm:
    profiles:
      - osrm-local
    image: ghcr.io/project-osrm/osrm-backend
    container_name: locator-osrm
    command: osrm-routed --algorithm mld /data/belarus-latest.osrm
    volumes:
      - ./osrm-data:/data
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null 'http://127.0.0.1:5000/route/v1/driving/27.5615,53.9023;27.5715,53.9123?overview=false' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: locator-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      default:
        aliases:
          - locator-rabbitmq

volumes:
  db_data:
  qr_codes:
# Деплой backend/frontend на сервер после push в main.
#
# Secrets (repository locator_go — те же значения, что в lctr_app):
#   DEPLOY_SSH_HOST   — 87.232.65.52
#   DEPLOY_SSH_USER   — root
#   DEPLOY_SSH_KEY    — приватный SSH-ключ (deploy key / server key)
# Optional variable: DEPLOY_SSH_PORT (default 22)

name: Deploy to Main Environment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          missing=0
          for name in DEPLOY_SSH_HOST DEPLOY_SSH_USER DEPLOY_SSH_KEY; do
            val="${{ secrets.DEPLOY_SSH_HOST }}"
            case "$name" in
              DEPLOY_SSH_HOST) val="${{ secrets.DEPLOY_SSH_HOST }}" ;;
              DEPLOY_SSH_USER) val="${{ secrets.DEPLOY_SSH_USER }}" ;;
              DEPLOY_SSH_KEY) val="${{ secrets.DEPLOY_SSH_KEY }}" ;;
            esac
            if [[ -z "$val" ]]; then
              echo "::error::Secret $name is not set in locator_go repository settings"
              missing=1
            fi
          done
          if [[ "$missing" -eq 1 ]]; then
            echo "Copy DEPLOY_SSH_HOST, DEPLOY_SSH_USER, DEPLOY_SSH_KEY from lctr_app repo secrets."
            exit 1
          fi

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          command_timeout: 20m
          script: |
            cd /root/locator_go
            git pull origin main
            docker compose up --build -d

# CI: проверка что push дошёл. Деплой выполняет сервер сам (cron, scripts/pull-and-deploy.sh).

name: Deploy to Main Environment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Server auto-deploy
        run: |
          echo "Push принят. Сервер 87.232.65.52 подтянет main в течение ~2 мин (cron)."
          echo "SSH/ключи GitHub Actions не нужны."

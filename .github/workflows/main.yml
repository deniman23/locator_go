# Деплой backend/frontend на сервер после push в main.
#
# Secrets — те же три, что в lctr_app (android-release.yml):
#   DEPLOY_SSH_HOST
#   DEPLOY_SSH_USER
#   DEPLOY_SSH_KEY

name: Deploy to Main Environment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        timeout-minutes: 20
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
        run: |
          if [[ -z "${DEPLOY_SSH_HOST:-}" || -z "${DEPLOY_SSH_USER:-}" ]]; then
            echo "::error::Add DEPLOY_SSH_HOST and DEPLOY_SSH_USER to locator_go secrets (same as lctr_app)"
            exit 1
          fi
          if [[ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]]; then
            echo "::error::Add DEPLOY_SSH_KEY to locator_go secrets (copy the same value from lctr_app)"
            exit 1
          fi
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > deploy_key.pem
          chmod 600 deploy_key.pem
          export DEPLOY_SSH_KEY_FILE="$RUNNER_TEMP/deploy_key.pem"
          mv deploy_key.pem "$DEPLOY_SSH_KEY_FILE"
          chmod +x scripts/ci/deploy-locator-go.sh
          ./scripts/ci/deploy-locator-go.sh
